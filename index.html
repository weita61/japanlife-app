<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>いってら — トモスマ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    /* ─── DESIGN TOKENS ─────────────────────────────── */
    :root {
      --accent: #8CC63F;
      --accent-light: #EEF5EC;
      --accent-dim: rgba(140,198,63,0.16);
      --navy: #2D4A10;
      --navy-light: #3A5F18;
      --navy-deep: #1E3209;
      --text: #2D4A10;
      --muted: #5A7A30;
      --muted-light: #9B9B9B;
      --border: #E8E8E4;
      --border-light: #EFF5EF;
      --surface: #FFFFFF;
      --bg: #EFF7EC;
      --success: #27ae60;
      --success-light: #e6f9ee;
      --danger: #e74c3c;
      --danger-light: #fde8e8;
      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --font-h: 'Zen Maru Gothic', sans-serif;
      --font-b: 'Noto Sans JP', 'Noto Sans', sans-serif;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.06);
    }

    /* ─── RESET & BASE ──────────────────────────────── */
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      height: 100%;
      font-family: var(--font-b);
      color: var(--text);
      background: var(--bg);
    }

    /* ── Simulator wrapper ── */
    #sim-wrap { width: 100%; height: 100%; display: flex; align-items: stretch; }
    #app { width: 100%; height: 100dvh; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
    #screen { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }

    /* ─── SCREEN TRANSITIONS ────────────────────────── */
    @keyframes slideInRight { from { transform: translateX(28px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInUp    { from { transform: translateY(18px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn       { from { opacity: 0; } to { opacity: 1; } }
    .screen-enter { animation: slideInRight 0.22s cubic-bezier(0.22,1,0.36,1) both; }
    .screen-enter-up { animation: slideInUp 0.22s cubic-bezier(0.22,1,0.36,1) both; }

    /* ── Desktop: iPhone simulator frame ── */
    @media (min-width: 768px) {
      :root { --sim-h: 844px; }
      html, body {
        background: #1c1c1e;
        display: flex; align-items: center; justify-content: center;
        overflow: hidden; width: 100vw; height: 100vh;
      }
      #sim-wrap {
        width: 390px; height: 844px; flex-shrink: 0;
        transform-origin: center center; position: relative;
      }
      #app {
        width: 390px; height: 844px; border-radius: 44px; overflow: hidden;
        box-shadow: 0 0 0 8px #1a1a1a, 0 0 0 10px #2a2a2a, 0 32px 80px rgba(0,0,0,0.6);
      }
    }
    @media (min-width: 768px) and (max-height: 900px) {
      #sim-wrap { transform: scale(0.88); transform-origin: center center; }
    }
    @media (min-width: 768px) and (max-height: 780px) {
      #sim-wrap { transform: scale(0.76); transform-origin: center center; }
    }

    /* ─── BOTTOM NAV ────────────────────────────────── */
    #nav {
      display: none;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border-light);
      padding: 8px 0 20px;
    }
    #nav.on { display: flex; }
    .ni {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px; padding: 6px 0;
      cursor: pointer; color: var(--muted-light);
      font-size: 9px; font-weight: 700;
      border: none; background: none;
      font-family: var(--font-h);
      letter-spacing: 0.04em;
      transition: color 0.15s, transform 0.15s;
    }
    .ni:active { transform: scale(0.9); }
    .ni.active { color: var(--accent); }
    .ni svg { width: 22px; height: 22px; }
    .ni.active svg { filter: drop-shadow(0 0 6px rgba(140,198,63,0.5)); }

    /* ─── SCREEN: LANGUAGE SELECTION ───────────────── */
    .ls {
      min-height: var(--sim-h, 100dvh);
      display: flex; flex-direction: column;
      padding: 80px 28px 48px;
      background: var(--navy);
      position: relative; overflow: hidden;
    }
    .ls::before {
      content: '';
      position: absolute; top: -120px; right: -80px;
      width: 320px; height: 320px;
      background: transparent;
      pointer-events: none;
    }
    .ls::after {
      content: '';
      position: absolute; bottom: -60px; left: -80px;
      width: 280px; height: 280px;
      background: transparent;
      pointer-events: none;
    }
    .ls-logo {
      font-family: var(--font-h); font-size: 38px; font-weight: 700;
      color: var(--accent); letter-spacing: -0.02em; margin-bottom: 6px;
      position: relative; z-index: 1;
    }
    .ls-logo-sub {
      font-size: 11px; color: rgba(255,255,255,0.35);
      letter-spacing: 0.12em; font-weight: 500; text-transform: uppercase;
      position: relative; z-index: 1;
    }
    .ls-divider {
      width: 32px; height: 2px; background: var(--accent);
      border-radius: 2px; margin: 14px 0; opacity: 0.6;
      position: relative; z-index: 1;
    }
    .ls-tag {
      font-family: var(--font-h); font-size: 14px; font-weight: 700;
      color: rgba(255,255,255,0.55); margin-bottom: 20px;
      position: relative; z-index: 1;
    }
    .lb-list { display: flex; flex-direction: column; gap: 8px; position: relative; z-index: 1; }
    .lb {
      width: 100%;
      background: rgba(255,255,255,0.055);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; color: white;
      transition: all 0.2s ease;
      position: relative; overflow: hidden;
      text-align: left;
    }
    .lb::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 100%);
      pointer-events: none;
    }
    .lb:active, .lb.sel {
      background: rgba(140,198,63,0.15);
      border-color: var(--accent);
    }
    .lb-flag { font-size: 24px; line-height: 1; }
    .lb-flag-box {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.08);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 22px;
    }
    .lb-name { font-family: var(--font-h); font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .lb-native { font-size: 11px; color: rgba(255,255,255,0.4); }
    .lb-tag {
      font-size: 10px; font-weight: 700; font-family: var(--font-h);
      background: var(--accent); color: var(--navy);
      padding: 3px 9px; border-radius: 100px; margin-left: auto;
    }
    .lb-check {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(0.5); transition: all 0.2s ease; flex-shrink: 0;
    }
    .lb:active .lb-check, .lb.sel .lb-check { opacity: 1; transform: scale(1); }
    .lb-check svg { width: 11px; height: 11px; stroke: var(--navy); stroke-width: 3; }
    .ls-footer {
      margin-top: auto; padding-top: 32px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      position: relative; z-index: 1;
    }
    .ls-footer-dot { width: 4px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 50%; }
    .ls-footer-text { font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; }

    /* ─── SCREEN: ONBOARD ────────────────────────── */
    .ob { min-height: var(--sim-h, 100dvh); padding: 72px 24px 32px; display: flex; flex-direction: column; }
    .ob-step-dots { display: flex; align-items: center; gap: 6px; margin-bottom: 28px; }
    .ob-step-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--border);
    }
    .ob-step-dot.active { background: var(--accent); width: 22px; border-radius: 4px; }
    .ob-step-dot.done { background: var(--success); }
    .ob-step { font-family: var(--font-h); font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: .12em; margin-bottom: 8px; }
    .ob-ttl { font-family: var(--font-h); font-size: 22px; font-weight: 700; line-height: 1.3; margin-bottom: 6px; }
    .ob-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .job-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; flex: 1; margin-bottom: 0; }
    .jc {
      background: var(--surface);
      border: 2px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 18px 14px 16px;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: flex-start; gap: 10px;
      transition: all 0.15s ease;
      position: relative; overflow: hidden;
    }
    .jc.sel { border-color: var(--accent); background: var(--accent-dim); }
    .jc-check {
      position: absolute; top: 10px; right: 10px;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(0.5); transition: all 0.2s ease;
    }
    .jc.sel .jc-check { opacity: 1; transform: scale(1); }
    .jc-check svg { width: 11px; height: 11px; stroke: var(--navy); stroke-width: 3; }
    .jc-icon-wrap {
      width: 40px; height: 40px; background: var(--bg);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .jc.sel .jc-icon-wrap { background: rgba(140,198,63,0.15); }
    .jc-e { font-size: 28px; }
    .jc-n { font-family: var(--font-h); font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .btn-p {
      width: 100%; background: var(--accent); color: #2D4A10;
      font-size: 15px; font-weight: 700; padding: 16px;
      border: none; border-radius: var(--radius-md);
      cursor: pointer; font-family: var(--font-h);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 24px;
      box-shadow: 0 4px 14px rgba(140,198,63,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-p:active { transform: scale(0.97); box-shadow: none; }
    .btn-p:disabled { opacity: .35; pointer-events: none; box-shadow: none; }
    .btn-s {
      width: 100%; background: var(--surface); color: var(--text);
      font-size: 14px; font-weight: 700; padding: 14px;
      border: 1.5px solid var(--border); border-radius: var(--radius-md);
      cursor: pointer; font-family: var(--font-h); margin-top: 10px;
      transition: border-color 0.15s;
    }
    .btn-s:active { border-color: var(--navy); }
    .btn-danger {
      width: 100%; background: var(--danger-light); color: var(--danger);
      font-size: 14px; font-weight: 700; padding: 14px;
      border: 1.5px solid rgba(231,76,60,0.3); border-radius: var(--radius-md);
      cursor: pointer; font-family: var(--font-h);
      transition: background 0.15s;
    }
    .btn-danger:active { background: rgba(231,76,60,0.15); }

    /* ─── SCREEN: HOME ──────────────────────────────── */
    .hh {
      padding: 12px 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border-light);
      position: sticky; top: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 10;
    }
    .hlogo { font-family: var(--font-h); font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    .hlogo span { color: var(--accent); }
    .hright { display: flex; align-items: center; gap: 8px; }
    .streak-pill {
      display: flex; align-items: center; gap: 5px;
      background: var(--accent-light);
      border: 1px solid rgba(140,198,63,0.4);
      border-radius: 100px; padding: 5px 11px;
      font-size: 13px; font-weight: 700; font-family: var(--font-h); cursor: pointer;
      transition: transform 0.15s;
    }
    .streak-pill:active { transform: scale(0.94); }
    .streak-pill svg { width: 13px; height: 13px; color: var(--accent); flex-shrink: 0; }
    .lang-pill {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 100px; padding: 5px 11px 5px 9px;
      font-size: 11px; font-weight: 700; cursor: pointer;
      font-family: var(--font-h); transition: border-color .2s;
    }
    .lang-pill:active { border-color: var(--accent); }
    .lang-pill-flag { font-size: 16px; line-height: 1; }
    .lang-pill svg { width: 12px; height: 12px; color: var(--muted-light); }
    .hcont { padding: 20px 20px 100px; }
    .search-icon-btn {
      width: 34px; height: 34px; background: var(--bg);
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
    }
    .search-icon-btn:active { background: var(--border-light); }
    .search-icon-btn svg { width: 15px; height: 15px; color: var(--muted); }
    /* Filter chips */
    .filter-row { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; margin-bottom: 16px; padding-bottom: 2px; }
    .filter-row::-webkit-scrollbar { display: none; }
    .fchip {
      padding: 7px 18px; border-radius: 100px; flex-shrink: 0;
      font-family: var(--font-h); font-size: 12px; font-weight: 700;
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--muted); cursor: pointer; white-space: nowrap; transition: all .15s;
      box-shadow: var(--shadow-sm);
    }
    .fchip.active { background: var(--navy); color: white; border-color: var(--navy); box-shadow: var(--shadow-md); }
    .sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .sec-ttl { font-family: var(--font-h); font-size: 14px; font-weight: 700; letter-spacing: 0.02em; }
    .sec-action { font-size: 12px; color: var(--muted); cursor: pointer; }

    /* Daily card */
    .daily {
      background: var(--accent);
      border-radius: var(--radius-lg);
      padding: 22px 20px 20px;
      margin-bottom: 24px; cursor: pointer;
      position: relative; overflow: hidden;
      box-shadow: var(--shadow-lg);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .daily:active { transform: scale(0.985); box-shadow: var(--shadow-md); }
    .daily::before {
      content: '';
      position: absolute; top: -80px; right: -60px;
      width: 240px; height: 240px;
      background: transparent;
      pointer-events: none;
    }
    .daily::after {
      content: '';
      position: absolute; bottom: -40px; left: -20px;
      width: 160px; height: 160px;
      background: transparent;
      pointer-events: none;
    }
    .daily-accent-line {
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.4);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }
    .daily-lbl-wrap { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; position: relative; z-index: 1; }
    .daily-lbl-dot { width: 6px; height: 6px; background: #2D4A10; border-radius: 50%; opacity: 0.5; }
    .daily-lbl {
      font-family: var(--font-h); font-size: 10px; font-weight: 700;
      color: #2D4A10; letter-spacing: 0.14em; text-transform: uppercase;
    }
    .daily-ttl {
      font-family: var(--font-h); font-size: 19px; font-weight: 700;
      color: #2D4A10; line-height: 1.35; margin-bottom: 4px;
      position: relative; z-index: 1;
    }
    .daily-sub { font-size: 12px; color: rgba(45,74,16,0.55); margin-bottom: 18px; position: relative; z-index: 1; }
    .daily-footer { display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
    .daily-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: #fff; color: #2D4A10;
      font-family: var(--font-h); font-size: 13px; font-weight: 700;
      padding: 8px 16px; border-radius: 100px;
      box-shadow: 0 2px 8px rgba(45,74,16,0.15);
    }
    .daily-btn svg { width: 13px; height: 13px; }
    .daily-progress { display: flex; align-items: center; gap: 6px; }
    .daily-progress-dots { display: flex; gap: 4px; }
    .dp-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(45,74,16,0.2); }
    .dp-dot.done { background: #2D4A10; opacity: 0.7; }
    .daily-progress-text { font-size: 10px; color: rgba(45,74,16,0.5); font-family: var(--font-h); }

    /* Category grid */
    .cat-list { display: flex; flex-direction: column; gap: 10px; }
    .cc {
      background: var(--surface);
      border: 1.5px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 16px;
      cursor: pointer; transition: all 0.15s ease;
      display: flex; align-items: center; gap: 14px;
      box-shadow: var(--shadow-sm);
      position: relative; overflow: hidden;
    }
    .cc::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--border); border-radius: 3px 0 0 3px;
      transition: background 0.2s;
    }
    .cc.ic-workplace-card::before { background: #16A34A; }
    .cc.ic-garbage-card::before   { background: #0F766E; }
    .cc.ic-greeting-card::before  { background: #059669; }
    .cc.ic-safety-card::before    { background: #BE123C; }
    .cc.ic-daily-card::before     { background: #65A30D; }
    .cc:active { transform: scale(0.98); box-shadow: none; }
    .cc:hover  { border-color: var(--border); box-shadow: var(--shadow-md); }
    .cc-body { flex: 1; min-width: 0; }
    .cc-name { font-family: var(--font-h); font-size: 14px; font-weight: 700; margin-bottom: 3px; line-height: 1.3; }
    .cc-desc { font-size: 11px; color: var(--muted); margin-bottom: 8px; line-height: 1.4; }
    .cc-row  { display: flex; align-items: center; gap: 8px; }
    .cc-cnt  { font-size: 11px; color: var(--muted-light); flex-shrink: 0; font-weight: 600; }
    .cc-time { font-size: 10px; color: var(--muted-light); flex-shrink: 0; font-family: var(--font-h); font-weight: 700;
               background: var(--bg); border: 1px solid var(--border); border-radius: 100px; padding: 1px 8px; }
    .prog-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; }
    .cc.done .prog-fill { background: var(--success); }
    .cc-done-badge {
      width: 24px; height: 24px;
      background: var(--success); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .cc-done-badge svg { width: 12px; height: 12px; stroke: white; stroke-width: 3; }
    .cc-arr { display: flex; align-items: center; flex-shrink: 0; }
    .cc-arr svg { width: 14px; height: 14px; color: var(--muted-light); }

    /* Home progress strip */
    .home-prog-strip {
      display: flex; align-items: center; gap: 12px;
      background: #E8F4E0; border-bottom: 1px solid rgba(140,198,63,0.25);
      padding: 10px 20px;
    }
    .hps-item { display: flex; align-items: center; gap: 6px; }
    .hps-val { font-family: var(--font-h); font-size: 15px; font-weight: 700; color: #2D4A10; }
    .hps-lbl { font-size: 11px; color: var(--muted); }
    .hps-div { width: 1px; height: 20px; background: var(--border); }
    .cc-body { flex: 1; min-width: 0; }
    .cc-name { font-family: var(--font-h); font-size: 14px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
    .cc-row { display: flex; align-items: center; gap: 8px; }
    .cc-cnt { font-size: 11px; color: var(--muted-light); flex-shrink: 0; }
    .prog-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; }
    .cc.done .prog-fill { background: var(--success); }
    .cc-done-badge {
      width: 24px; height: 24px;
      background: var(--success); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .cc-done-badge svg { width: 12px; height: 12px; stroke: white; stroke-width: 3; }
    .cc-arr { display: flex; align-items: center; flex-shrink: 0; }
    .cc-arr svg { width: 14px; height: 14px; color: var(--muted-light); }
    /* Quiz wrong-answer review hint */
    .qz-review { font-size: 12px; color: var(--muted-light); text-align: center; margin-top: 10px; padding: 8px 12px; background: var(--accent-dim); border-radius: var(--radius-sm); }

    /* ─── SCREEN HEADER (shared) ───────────────────── */
    .sh {
      padding: 13px 20px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border-light);
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 10;
    }
    .back {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); border-radius: var(--radius-sm);
      cursor: pointer; border: none; flex-shrink: 0;
      transition: background 0.15s, transform 0.15s;
    }
    .back:active { background: var(--border); transform: scale(0.92); }
    .back svg { width: 18px; height: 18px; color: var(--text); }
    .sh-ttl { font-family: var(--font-h); font-size: 16px; font-weight: 700; flex: 1; }
    .share-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: var(--accent-light); border-radius: var(--radius-sm);
      cursor: pointer; border: none; flex-shrink: 0;
      transition: background 0.15s, transform 0.15s;
    }
    .share-btn:active { transform: scale(0.92); }
    .share-btn svg { width: 16px; height: 16px; color: var(--accent); }

    /* ─── ITEM LIST (Category screen) ─────────────── */
    .il { padding: 16px 20px 100px; display: flex; flex-direction: column; gap: 8px; }
    .ic {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface);
      border: 1.5px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 14px; cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all 0.15s;
    }
    .ic:active { transform: scale(0.98); box-shadow: none; }
    .ic-dot {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; background: var(--bg);
      border: 1.5px solid var(--border);
    }
    .ic-dot.done {
      background: rgba(39,174,96,0.12);
      border-color: transparent;
    }
    .ic-dot.done svg { color: var(--success); }
    .ic-dot svg { width: 15px; height: 15px; color: var(--muted-light); }
    .ic-ttl { font-family: var(--font-h); font-size: 14px; font-weight: 700; }
    .ic-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .ic-arr svg { width: 14px; height: 14px; color: var(--muted-light); }

    /* Category progress bar (below header) */
    .cat-prog-wrap {
      background: var(--surface); padding: 14px 20px;
      border-bottom: 1px solid var(--border-light);
    }
    .cat-prog-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .cat-prog-lbl { font-size: 11px; color: var(--muted); font-family: var(--font-h); font-weight: 700; }
    .cat-prog-cnt { font-size: 11px; color: var(--muted); }
    .cat-prog-track { height: 4px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .cat-prog-fill { height: 100%; background: var(--success); border-radius: 3px; transition: width 0.3s ease; }

    /* ─── ITEM DETAIL ───────────────────────────────── */
    .id { padding: 20px 20px 120px; }
    .cb {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 16px; margin-bottom: 12px;
    }
    .cb-lbl {
      font-family: var(--font-h); font-size: 11px; font-weight: 700;
      letter-spacing: .1em; color: var(--muted); text-transform: uppercase;
      margin-bottom: 10px; margin-top: 0;
    }
    .cb-txt { font-size: 15px; line-height: 1.7; white-space: pre-line; color: var(--text); }
    .tip {
      background: var(--accent-light);
      border: 1px solid rgba(140,198,63,0.4);
      border-radius: var(--radius-md);
      padding: 14px 16px; margin-bottom: 20px;
      display: flex; gap: 10px;
    }
    .tip-icon-box {
      width: 28px; height: 28px; background: var(--accent);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .tip-icon-box svg { width: 15px; height: 15px; color: white; }
    .tip-body {}
    .tip-lbl {
      font-family: var(--font-h); font-size: 11px; font-weight: 700;
      color: #3A5F18; letter-spacing: .08em; text-transform: uppercase;
      margin-bottom: 4px;
    }
    .tip-txt { font-size: 13px; line-height: 1.6; color: #2D4A10; }
    .done-btn {
      width: 100%; background: var(--accent); color: #2D4A10;
      font-size: 15px; font-weight: 700; padding: 16px;
      border: none; border-radius: var(--radius-md);
      cursor: pointer; font-family: var(--font-h);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    /* COMPLETION */
    .comp {
      background: rgba(39,174,96,0.1);
      border: 1.5px solid rgba(39,174,96,0.3);
      border-radius: var(--radius-md);
      padding: 18px 16px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 14px;
    }
    .comp-circle {
      width: 44px; height: 44px; background: var(--success);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .comp-circle svg { width: 22px; height: 22px; stroke: white; stroke-width: 2.5; }
    .comp-body {}
    .comp-pts { font-family: var(--font-h); font-size: 15px; font-weight: 700; color: var(--success); margin-bottom: 2px; }
    .comp-stat { font-size: 12px; color: #1a7040; }
    .comp-badge {
      margin-top: 8px; background: var(--accent); color: var(--navy);
      font-family: var(--font-h); font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 100px; display: inline-block;
    }
    .comp-hint { font-family: var(--font-h); font-size: 11px; color: var(--accent); font-weight: 700; margin-top: 4px; }
    .back-link { display: block; text-align: center; margin-top: 12px; font-size: 13px; color: var(--muted); cursor: pointer; text-decoration: underline; }

    /* ─── PROFILE / AVATAR ─────────────────────────── */
    .profile-card {
      background: var(--navy); border-radius: var(--radius-lg);
      padding: 24px 20px 20px; margin-bottom: 16px;
      position: relative; overflow: hidden;
      box-shadow: var(--shadow-lg);
    }
    .profile-card::before {
      content: ''; position: absolute; top: -80px; right: -60px;
      width: 260px; height: 260px;
      background: transparent;
      pointer-events: none;
    }
    .profile-top { display: flex; align-items: center; gap: 16px; position: relative; z-index: 1; margin-bottom: 16px; }
    .avatar-wrap { position: relative; cursor: pointer; flex-shrink: 0; }
    .avatar-circle {
      width: 64px; height: 64px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 3px solid rgba(255,255,255,0.15);
      transition: transform 0.15s, border-color 0.15s;
    }
    .avatar-circle:active { transform: scale(0.93); }
    .avatar-circle svg { width: 32px; height: 32px; stroke: white; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .avatar-edit-badge {
      position: absolute; bottom: -2px; right: -2px;
      width: 20px; height: 20px; background: var(--accent);
      border-radius: 50%; border: 2px solid var(--navy);
      display: flex; align-items: center; justify-content: center;
    }
    .avatar-edit-badge svg { width: 10px; height: 10px; stroke: var(--navy); stroke-width: 2.5; fill: none; }
    .profile-info { flex: 1; }
    .nickname-display {
      font-family: var(--font-h); font-size: 18px; font-weight: 700; color: white;
      margin-bottom: 4px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
    }
    .nickname-display svg { width: 13px; height: 13px; stroke: rgba(255,255,255,0.4); stroke-width: 2; fill: none; opacity: 0.6; }
    .nickname-input {
      font-family: var(--font-h); font-size: 17px; font-weight: 700; color: white;
      background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 8px; padding: 4px 10px; width: 100%; margin-bottom: 4px;
      outline: none;
    }
    .nickname-input:focus { border-color: var(--accent); }
    .profile-lv-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(140,198,63,0.15); border: 1px solid rgba(140,198,63,0.3);
      border-radius: 100px; padding: 3px 10px;
      font-family: var(--font-h); font-size: 11px; font-weight: 700; color: var(--accent);
    }
    .profile-xp-row { position: relative; z-index: 1; }
    .profile-xp-label { font-size: 10px; color: rgba(255,255,255,0.35); margin-bottom: 6px; display: flex; justify-content: space-between; font-family: var(--font-h); font-weight: 700; }
    .profile-xp-track { height: 6px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; }
    .profile-xp-fill { height: 100%; background: var(--accent); border-radius: 6px; transition: width .5s; }

    /* Avatar picker modal */
    .avatar-picker-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 100; display: flex; align-items: flex-end;
      backdrop-filter: blur(4px);
    }
    .avatar-picker-sheet {
      background: var(--surface); border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: 20px; width: 100%;
      animation: slideInUp 0.25s cubic-bezier(0.22,1,0.36,1) both;
    }
    .avatar-picker-title { font-family: var(--font-h); font-size: 15px; font-weight: 700; margin-bottom: 16px; text-align: center; }
    .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
    .avatar-opt {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer; padding: 8px; border-radius: var(--radius-sm);
      border: 2px solid transparent; transition: all 0.15s;
    }
    .avatar-opt.sel { border-color: var(--accent); background: var(--accent-light); }
    .avatar-opt-circle {
      width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .avatar-opt-circle svg { width: 26px; height: 26px; stroke: white; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .avatar-opt-lbl { font-family: var(--font-h); font-size: 10px; font-weight: 700; color: var(--muted); }

    /* ─── STATS / GROWTH ────────────────────────────── */
    .stats-wrap { padding: 20px 20px 100px; }
    .lv-card {
      background: var(--navy); border-radius: var(--radius-lg);
      padding: 22px 20px 20px; margin-bottom: 16px;
      position: relative; overflow: hidden;
      box-shadow: var(--shadow-lg);
    }
    .lv-card::before {
      content: '';
      position: absolute; top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: transparent;
      pointer-events: none;
    }
    .lv-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; position: relative; z-index: 1; }
    .lv-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(140,198,63,0.15);
      border: 1px solid rgba(140,198,63,0.3);
      border-radius: 100px; padding: 5px 12px;
      font-family: var(--font-h); font-size: 12px; font-weight: 700; color: var(--accent);
    }
    .lv-num { font-family: var(--font-h); font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.4); }
    .lv-name { font-family: var(--font-h); font-size: 22px; font-weight: 700; color: white; position: relative; z-index: 1; margin-bottom: 4px; }
    .lv-pts { font-size: 12px; color: rgba(255,255,255,.4); position: relative; z-index: 1; margin-bottom: 14px; }
    .xp-track {
      height: 8px; background: rgba(255,255,255,.1);
      border-radius: 6px; overflow: hidden; margin-bottom: 6px;
      position: relative; z-index: 1;
    }
    .xp-fill { height: 100%; background: var(--accent); border-radius: 6px; transition: width .5s; }
    .xp-label { font-size: 11px; color: rgba(255,255,255,.3); text-align: right; position: relative; z-index: 1; }
    .stat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 20px; }
    .stat-cell {
      background: var(--surface); border: 1.5px solid var(--border-light);
      border-radius: var(--radius-md); padding: 16px 14px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .stat-cell-icon {
      width: 32px; height: 32px; background: var(--bg);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
    }
    .stat-cell-icon svg { width: 16px; height: 16px; color: var(--navy); }
    .stat-cell-lbl { font-family: var(--font-h); font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
    .stat-cell-val { font-family: var(--font-h); font-size: 26px; font-weight: 700; color: var(--text); }
    .stat-cell-unit { font-size: 11px; color: var(--muted); font-weight: 400; }
    .badge-ttl { font-family: var(--font-h); font-size: 15px; font-weight: 700; margin-bottom: 12px; }
    .badge-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .bi {
      text-align: center; padding: 14px 10px;
      background: var(--surface); border: 1.5px solid var(--border-light);
      border-radius: var(--radius-md);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .bi.earned { border-color: var(--accent); background: var(--accent-light); }
    .bi-e { font-size: 26px; line-height: 1; }
    .bi-n { font-family: var(--font-h); font-size: 10px; font-weight: 700; line-height: 1.3; color: var(--text); }
    .bi:not(.earned) { opacity: 0.45; }
    .bi:not(.earned) .bi-n { color: var(--muted); }

    /* ─── QUIZ ──────────────────────────────────────── */
    .qz { padding: 20px 20px 120px; display: flex; flex-direction: column; }
    .qz-prog {
      height: 5px; background: var(--border);
      border-radius: 4px; margin-bottom: 24px; overflow: hidden;
    }
    .qz-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .5s cubic-bezier(0.22,1,0.36,1); }
    .qz-num {
      font-family: var(--font-h); font-size: 11px; font-weight: 700;
      color: var(--accent); letter-spacing: .12em; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .qz-q { font-family: var(--font-h); font-size: 21px; font-weight: 700; line-height: 1.5; margin-bottom: 28px; }
    .qz-choices { display: flex; flex-direction: column; gap: 10px; }
    .qz-c {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: all 0.15s ease;
      text-align: left; font-family: var(--font-b);
      box-shadow: var(--shadow-sm);
    }
    .qz-c:hover { border-color: rgba(140,198,63,0.4); box-shadow: var(--shadow-md); }
    .qz-c:active { transform: scale(0.985); }
    .qz-c-num {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--bg); border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-h); font-size: 13px; font-weight: 700;
      color: var(--muted); flex-shrink: 0;
      transition: all 0.15s;
    }
    .qz-c-txt { font-size: 14px; color: var(--text); line-height: 1.5; font-weight: 500; }
    .qz-c.correct { background: rgba(39,174,96,0.06); border-color: var(--success); }
    .qz-c.correct .qz-c-num { background: var(--success); border-color: var(--success); color: white; }
    .qz-c.wrong { background: rgba(231,76,60,0.06); border-color: #e74c3c; }
    .qz-c.wrong .qz-c-num { background: #e74c3c; border-color: #e74c3c; color: white; }
    .qz-exp {
      margin-top: 16px; border-radius: var(--radius-md);
      padding: 14px 16px; display: flex; gap: 10px;
      background: rgba(39,174,96,0.08);
      border: 1.5px solid rgba(39,174,96,0.2);
      font-size: 13px; line-height: 1.6; color: #1a7040;
      animation: slideInUp 0.2s ease both;
    }
    .qz-exp.wrong-fb {
      background: rgba(231,76,60,0.06);
      border: 1.5px solid rgba(231,76,60,0.2);
      color: #9b2519;
    }
    .qz-res {
      min-height: var(--sim-h, 100dvh);
      background: var(--navy);
      display: flex; flex-direction: column; align-items: center;
      padding: 72px 24px 48px;
      position: relative; overflow: hidden;
    }
    .qz-res::before {
      content: '';
      position: absolute; top: -120px; right: -80px;
      width: 340px; height: 340px;
      background: transparent;
      pointer-events: none;
    }
    .qz-res::after {
      content: '';
      position: absolute; bottom: -80px; left: -60px;
      width: 280px; height: 280px;
      background: transparent;
      pointer-events: none;
    }
    .qz-res-badge {
      width: 96px; height: 96px; background: var(--accent);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px; position: relative; z-index: 1;
      box-shadow: 0 0 0 12px rgba(140,198,63,0.12), 0 0 0 24px rgba(140,198,63,0.06);
      font-size: 42px;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .qz-res-lbl {
      font-family: var(--font-h); font-size: 10px; font-weight: 700;
      color: rgba(255,255,255,0.35); letter-spacing: 0.18em;
      text-transform: uppercase; margin-bottom: 8px; position: relative; z-index: 1;
    }
    .qz-res-ttl {
      font-family: var(--font-h); font-size: 26px; font-weight: 700;
      color: white; text-align: center; margin-bottom: 6px;
      position: relative; z-index: 1;
    }
    .qz-res-sub {
      font-size: 13px; color: rgba(255,255,255,0.4);
      text-align: center; margin-bottom: 28px; position: relative; z-index: 1;
    }
    .qz-score-grid {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 10px;
      width: 100%; margin-bottom: 32px; position: relative; z-index: 1;
    }
    .qz-score-cell {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-md); padding: 16px 10px; text-align: center;
      backdrop-filter: blur(4px);
    }
    .qz-score-val { font-family: var(--font-h); font-size: 24px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
    .qz-score-lbl { font-size: 10px; color: rgba(255,255,255,0.35); font-family: var(--font-h); font-weight: 700; }
    .qz-res-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; position: relative; z-index: 1; }
    .qz-res-btn-p {
      background: var(--accent); color: var(--navy);
      font-family: var(--font-h); font-size: 15px; font-weight: 700;
      border: none; border-radius: var(--radius-md); padding: 16px;
      cursor: pointer; width: 100%;
      box-shadow: 0 4px 16px rgba(140,198,63,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .qz-res-btn-p:active { transform: scale(0.97); box-shadow: none; }
    .qz-res-btn-s {
      background: rgba(255,255,255,0.08); color: white;
      font-family: var(--font-h); font-size: 14px; font-weight: 700;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-md); padding: 14px;
      cursor: pointer; width: 100%;
      transition: background 0.15s;
    }
    .qz-res-btn-s:active { background: rgba(255,255,255,0.14); }
    /* legacy score display (kept for compatibility) */
    .qz-res-score { font-family: var(--font-h); font-size: 52px; font-weight: 700; color: var(--accent); line-height: 1; }
    /* Quiz XP pill */
    .qz-xp-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(140,198,63,0.12);
      border: 1px solid rgba(140,198,63,0.25);
      border-radius: 100px; padding: 6px 14px;
      margin-bottom: 28px; position: relative; z-index: 1;
    }
    .qz-xp-pill svg { width: 14px; height: 14px; color: var(--accent); }
    .qz-xp-text { font-family: var(--font-h); font-size: 13px; font-weight: 700; color: var(--accent); }

    /* ─── SETTINGS ──────────────────────────────────── */
    .set-wrap { padding: 16px 20px 100px; }
    .set-sec { margin-bottom: 28px; }
    .set-sec-ttl {
      font-family: var(--font-h); font-size: 11px; font-weight: 700;
      color: var(--muted); letter-spacing: .12em; text-transform: uppercase;
      margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border-light);
    }
    .set-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--border-light);
    }
    .set-row:last-child { border-bottom: none; }
    .set-row-lbl { font-family: var(--font-h); font-size: 14px; font-weight: 700; }
    .set-row-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .toggle {
      width: 44px; height: 26px; background: var(--border);
      border-radius: 13px; position: relative; cursor: pointer;

    }
    .toggle.on::after { transform: translateX(18px); }
    .time-input {
      background: var(--bg); border: 1.5px solid var(--border);

      border-radius: var(--radius-md); cursor: pointer; transition: all .15s;

    /* ─── TOAST ─────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%);

    #splash {

      display: flex; align-items: center; justify-content: center;

    }

    .splash-logo {

      font-weight: 900; font-size: 60px; color: #fff;
      letter-spacing: 0.05em;
    }
  </style>
</head>

function tc(o){if(!o)return'';if(S.lang==='ja_easy')return o.ja_easy||o.ja||o.en||'';return o[S.lang]||o.en||'';}
function tc_arr(a){if(S.lang==='ja_easy')return a.ja_easy||a.ja||a.en||[];return a[S.lang]||a.en||[];}

let S=load();
// セッション中のクイズ選択肢シャッフル順（localStorageに保存しない）
let quizOrders={};
function getQuizOrder(qi){
  if(!quizOrders[qi]){
    const n=QUIZZES[qi]?tc_arr(QUIZZES[qi].choices).length:4;
    quizOrders[qi]=Array.from({length:n},(_,i)=>i).sort(()=>Math.random()-.5);
  }
  return quizOrders[qi];
}
function load(){
  const def={screen:'language',lang:'ja',jobType:null,tab:'home',catId:null,itemId:null,
    progress:{},streak:0,lastVisit:null,points:0,badges:[],
    quizIdx:0,quizAns:[],quizHistory:[],quizSetStart:0,catFilter:'all',
    searchQ:'',notifEnabled:false,notifTime:'09:00',lastNotif:null,
    avatar:0,nickname:'',showAvatarPicker:false,editNickname:false,
    firstUse:new Date().toDateString(),dualLang:true};
  try{const d=localStorage.getItem('jl2');if(d)return Object.assign(def,JSON.parse(d));}catch(e){}
  return def;
}
function save(){try{localStorage.setItem('jl2',JSON.stringify(S));}catch(e){}}

// ── HELPERS ───────────────────────────────────────────
function getDone(cid){const c=CATS.find(x=>x.id===cid);return c?c.items.filter(i=>S.progress[i.id]).length:0;}
function getPct(cid){const c=CATS.find(x=>x.id===cid);return(c&&c.items.length)?getDone(cid)/c.items.length:0;}
function getLevel(){for(let i=LEVELS.length-1;i>=0;i--)if(S.points>=LEVELS[i].min)return LEVELS[i];return LEVELS[0];}
function getNextItem(cid,iid){const c=CATS.find(x=>x.id===cid);if(!c)return null;const i=c.items.findIndex(x=>x.id===iid);return(i>=0&&i<c.items.length-1)?c.items[i+1]:null;}
function getDailyItem(){
  const all=CATS.flatMap(c=>c.items.map(i=>({...i,catId:c.id})));
  const unread=all.filter(i=>!S.progress[i.id]);
  if(unread.length)return unread[0];
  return all[Math.floor(Date.now()/86400000)%all.length];
}
function totalItems(){return CATS.reduce((a,c)=>a+c.items.length,0);}
function doneItems(){return CATS.reduce((a,c)=>a+getDone(c.id),0);}
function quizAcc(){const h=S.quizHistory;if(!h.length)return null;const tot=h.reduce((a,x)=>a+x.total,0);const cor=h.reduce((a,x)=>a+x.correct,0);return tot?Math.round(cor/tot*100):null;}
function checkBadges(){
  BADGES.forEach(b=>{
    if(S.badges.includes(b.id))return;
    if(b.catId&&getPct(b.catId)>=1){S.badges.push(b.id);S.points+=50;}
    if(b.id==='b_str7'&&S.streak>=7){S.badges.push(b.id);S.points+=100;}
  });
}
function updateStreak(){
  const today=new Date().toDateString();
  if(S.lastVisit===today)return;
  const y=new Date();y.setDate(y.getDate()-1);
  S.streak=(S.lastVisit===y.toDateString())?S.streak+1:1;
  S.lastVisit=today;
}
function srch(q){
  if(!q.trim())return[];
  const lo=q.toLowerCase();
  return CATS.flatMap(c=>c.items.filter(i=>tc(i.titles).toLowerCase().includes(lo)||tc(i.body).toLowerCase().includes(lo)).map(i=>({...i,catId:c.id,catName:tc(c.titles)})));
}
function showToast(msg){
  const el=document.createElement('div');el.className='toast';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>{el.classList.add('hide');setTimeout(()=>el.remove(),400);},2000);
}
async function shareItem(item,cat){
  const ja=item.titles.ja;
  const nativeTip=tc(item.tip);
  const jaTip=item.tip.ja;
  let text=`[いってら] ${ja}\n\n`;
  if(S.lang!=='ja')text+=`${nativeTip}\n`;
  text+=`tip: ${jaTip}\n\n#いってら #技能実習生 #TOMOSUMA`;
  try{
    if(navigator.share)await navigator.share({title:`いってら｜${ja}`,text});
    else{await navigator.clipboard.writeText(text);showToast(t('share.copied'));}
  }catch(e){try{await navigator.clipboard.writeText(text);showToast(t('share.copied'));}catch(e2){}}
}
function checkNotif(){
  if(!S.notifEnabled||!S.notifTime)return;
  if(!('Notification'in window)||Notification.permission!=='granted')return;
  const now=new Date();
  const [h,m]=S.notifTime.split(':').map(Number);
  const today=now.toDateString();
  if(S.lastNotif===today)return;
  if(now.getHours()===h&&now.getMinutes()===m){
    S.lastNotif=today;save();
    const d=getDailyItem();
    new Notification('いってら',{body:tc(d.titles)+' — '+t('notif.body')});
  }
}
async function enableNotif(){
  if(!('Notification'in window)){showToast('この端末は非対応です');return;}
  const p=await Notification.requestPermission();
  if(p==='granted'){S.notifEnabled=true;save();render();}
  else{showToast('通知が許可されていません');}
}

function render(){
  const nav=document.getElementById('nav');
  const showNav=['home','search','category','item','quiz','stats','settings'].includes(S.screen);
  nav.classList.toggle('on',showNav&&S.screen!=='language'&&S.screen!=='jobtype');
  document.querySelectorAll('.ni').forEach(el=>el.classList.toggle('active',el.dataset.nav===S.tab));
  ['home','quiz','stats','settings'].forEach(k=>{const el=document.getElementById('nl-'+k);if(el)el.textContent=t('nav.'+k);});
  const scr=document.getElementById('screen');
  scr.innerHTML=renderScreen();
  // animate new screen
  const first=scr.firstElementChild;
  if(first){first.classList.add('screen-enter');}
  bindInputs();
}
function renderScreen(){
  switch(S.screen){
    case 'language': return rLang();
    case 'jobtype':  return rJob();
    case 'home':     return rHome();
    case 'search':   return rSearch();
    case 'category': return rCat();
    case 'item':     return rItem();
    case 'quiz': {const ss=S.quizSetStart||0;const sz=Math.min(5,QUIZZES.length-ss);return S.quizAns.length===sz?rQuizRes():rQuiz();}
    case 'stats':    return rStats();
    case 'settings': return rSettings();
    default:         return rHome();
  }
}

function rItem(){
  const cat=CATS.find(x=>x.id===S.catId);
  const item=cat&&cat.items.find(x=>x.id===S.itemId);
  if(!item)return'';
  const done=S.progress[item.id];
  const isJa=S.lang==='ja'||S.lang==='ja_easy';
  const showDual=S.dualLang&&!isJa;
  const showEasyDual=S.dualLang&&S.lang==='ja_easy';
  const nextItem=getNextItem(S.catId,item.id);
  const catDone=getDone(S.catId);
  const catTotal=cat.items.length;
  const catComplete=catDone>=catTotal;
  const badgeForCat=BADGES.find(b=>b.catId===S.catId);
  const rem=catTotal-catDone;

  // content blocks
  let blocks='';
  if(showDual){
    blocks=`
      <div class="cb"><div class="cb-lbl">${t('item.native')}</div><div class="cb-txt">${tc(item.body)}</div></div>
      <div class="cb"><div class="cb-lbl">${t('item.ja')}</div><div class="cb-txt">${item.body.ja}</div></div>`;
  }else if(showEasyDual){
    blocks=`
      <div class="cb"><div class="cb-lbl">${t('item.native')}</div><div class="cb-txt">${tc(item.body)}</div></div>
      <div class="cb"><div class="cb-lbl">${t('item.ja')}</div><div class="cb-txt">${item.body.ja}</div></div>`;
  }else{
    blocks=`<div class="cb"><div class="cb-lbl">${isJa?t('item.ja'):t('item.native')}</div><div class="cb-txt">${tc(item.body)}</div></div>`;
  }

  // tip
  const tipBlock=`
    <div class="tip">
      <div class="tip-icon-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div class="tip-body">
        <div class="tip-lbl">${t('item.tip')}</div>
        <div class="tip-txt">${tc(item.tip)}</div>
      </div>
    </div>`;

  // action
  let action='';
  if(!done){
    action=`<button class="done-btn" data-a="markDone" data-v="${item.id}">${t('item.done')}</button>`;
  }else{
    const badgeRow=catComplete&&badgeForCat
      ?`<div class="comp-badge">${t('comp.badge')} ${cat.emoji}</div>`
      :rem===1?`<div class="comp-hint">${t('comp.hint1')}</div>`:'';
    action=`
      <div class="comp">
        <div class="comp-circle">${I.check}</div>
        <div class="comp-body">
          <div class="comp-pts">${t('comp.pt')}</div>
          <div class="comp-stat">${catDone} / ${catTotal} 完了</div>
          ${badgeRow}
        </div>
      </div>
      ${nextItem
        ?`<button class="btn-p" data-a="goNextItem" data-cat="${S.catId}" data-item="${nextItem.id}">${t('item.next')}</button>`
        :`<button class="btn-p" data-a="back">${catComplete?t('item.allcat'):t('item.back')}</button>`}
      ${nextItem?`<span class="back-link" data-a="back">${t('item.back')}</span>`:''}`;
  }

  return`
    <div class="sh">
      <button class="back" data-a="back">${I.back}</button>
      <span class="sh-ttl">${tc(item.titles)}</span>
      <button class="share-btn" data-a="shareItem" data-cat="${S.catId}" data-item="${item.id}">${I.share}</button>
    </div>
    <div class="id">${blocks}${tipBlock}${action}</div>`;
}

function rQuiz(){
  const ss=S.quizSetStart||0;
  const sz=Math.min(5,QUIZZES.length-ss);
  const pos=S.quizIdx-ss; // 0–4 within current set
  const q=QUIZZES[S.quizIdx];
  const pct=pos/sz*100;
  const order=getQuizOrder(S.quizIdx);
  const choices=tc_arr(q.choices);
  const labels=['A','B','C','D'];
  const setNum=Math.floor(ss/5)+1;
  const totalSets=Math.ceil(QUIZZES.length/5);
  return`
    <div class="sh">
      <button class="back" data-a="goHome">${I.back}</button>
      <span class="sh-ttl">Quiz ${pos+1}/${sz}${totalSets>1?' · Set '+setNum+'/'+totalSets:''}</span>
    </div>
    <div class="qz">
      <div class="qz-prog"><div class="qz-fill" style="width:${pct}%"></div></div>
      <div class="qz-num">Q${pos+1} / ${sz}</div>
      <div class="qz-q">${tc(q.question)}</div>
      <div class="qz-choices">
        ${order.map((origIdx,i)=>`<button class="qz-c" data-a="answer" data-qi="${S.quizIdx}" data-ci="${origIdx}">
          <span class="qz-c-num">${labels[i]||i+1}</span>
          <span class="qz-c-txt">${choices[origIdx]}</span>
        </button>`).join('')}
      </div>
    </div>`;
}

function rQuizRes(){
  const ss=S.quizSetStart||0;
  const sz=Math.min(5,QUIZZES.length-ss);
  const cor=S.quizAns.filter(a=>a.ok).length;
  const p=cor/sz;
  const pctScore=Math.round(p*100);
  const earnedXP=cor*20;
  const hasMore=ss+sz<QUIZZES.length;
  const resIcon = p>=.8
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="${'#2D4A10'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:44px;height:44px"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`
    : p>=.6
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="${'#2D4A10'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:44px;height:44px"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="${'#2D4A10'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:44px;height:44px"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`;
  return`<div class="qz-res">
    <div class="qz-res-badge">${resIcon}</div>
    <div class="qz-res-lbl">QUIZ RESULT</div>
    <div class="qz-res-ttl">${p>=.8?t('quiz.great'):p>=.6?t('quiz.good'):t('quiz.keep')}</div>
    <div class="qz-res-sub">${cor} / ${sz} ${t('quiz.score')}</div>
    <div class="qz-xp-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      <span class="qz-xp-text">+${earnedXP} XP</span>
    </div>
    <div class="qz-score-grid">
      <div class="qz-score-cell">
        <div class="qz-score-val">${cor}</div>
        <div class="qz-score-lbl">正解</div>
      </div>
      <div class="qz-score-cell">
        <div class="qz-score-val">${sz}</div>
        <div class="qz-score-lbl">問題数</div>
      </div>
      <div class="qz-score-cell">
        <div class="qz-score-val">${pctScore}%</div>
        <div class="qz-score-lbl">正解率</div>
      </div>
    </div>
    <div class="qz-res-btns">
      ${hasMore?`<button class="qz-res-btn-p" data-a="nextQuizSet">次の5問へ →</button>`:''}
      <button class="${hasMore?'qz-res-btn-s':'qz-res-btn-p'}" data-a="retryQuiz">${t('quiz.retry')}</button>
      <button class="qz-res-btn-s" data-a="goHome">${t('quiz.home')}</button>
    </div>
  </div>`;
}

// ── EVENTS ────────────────────────────────────────────
function bindInputs(){
  const inp=document.getElementById('si');
  if(inp){inp.addEventListener('input',e=>{S.searchQ=e.target.value;document.getElementById('screen').innerHTML=renderScreen();bindInputs();});inp.focus();}
  const nt=document.getElementById('notif-time');
  if(nt){nt.addEventListener('change',e=>{S.notifTime=e.target.value;save();});}
  const nn=document.getElementById('nn-input');
  if(nn){
    nn.addEventListener('blur',e=>{S.nickname=e.target.value.trim();S.editNickname=false;save();render();});
    nn.addEventListener('keydown',e=>{if(e.key==='Enter'){e.target.blur();}});
  }
}

document.addEventListener('click',e=>{
  const el=e.target.closest('[data-a]');if(!el)return;
  const a=el.dataset.a,v=el.dataset.v;

  if(a==='setLang'){
    S.lang=v;
    if(!el.dataset.stay){S.screen='jobtype';}
    save();render();
  }
  if(a==='selJob'){
    S.jobType=v;
    if(!el.dataset.stay){
      document.querySelectorAll('.jc').forEach(c=>c.classList.toggle('sel',c.dataset.v===v));
      const btn=document.querySelector('[data-a="startApp"]');if(btn)btn.disabled=false;
    }else{save();render();}
  }
  if(a==='startApp'&&S.jobType){updateStreak();S.screen='home';S.tab='home';save();render();}
  if(a==='goSearch'){S.screen='search';save();render();}
  if(a==='goCat'){S.catId=v;S.screen='category';save();render();}
  if(a==='goItem'){S.catId=el.dataset.cat;S.itemId=el.dataset.item;S.screen='item';save();render();}
  if(a==='goNextItem'){S.catId=el.dataset.cat;S.itemId=el.dataset.item;save();render();}
  if(a==='goHome'){S.screen='home';S.tab='home';S.quizIdx=0;S.quizAns=[];S.quizSetStart=0;save();render();}
  if(a==='goSettings'){S.screen='settings';S.tab='settings';save();render();}
  if(a==='back'){
    if(S.screen==='item')S.screen='category';
    else if(S.screen==='category'){S.screen='home';S.tab='home';}
    else{S.screen='home';S.tab='home';}
    save();render();
  }
  if(a==='markDone'){
    if(!S.progress[v]){S.progress[v]=true;S.points+=10;checkBadges();save();render();}
  }
  if(a==='shareItem'){
    const cat=CATS.find(x=>x.id===el.dataset.cat);
    const item=cat&&cat.items.find(x=>x.id===el.dataset.item);
    if(item)shareItem(item,cat);
  }
  if(a==='answer'){
    const qi=parseInt(el.dataset.qi),ci=parseInt(el.dataset.ci);
    const q=QUIZZES[qi];const ok=ci===q.answer;
    document.querySelectorAll('.qz-c').forEach(c=>{
      const origIdx=parseInt(c.dataset.ci);
      c.disabled=true;
      if(origIdx===q.answer)c.classList.add('correct');
      else if(origIdx===ci&&!ok)c.classList.add('wrong');
    });
    S.quizAns.push({qi,ci,ok});if(ok)S.points+=20;save();
    const exp=document.createElement('div');
    exp.className='qz-exp';
    exp.innerHTML=tc(q.explanation);
    document.querySelector('.qz-choices').after(exp);
    if(!ok&&q.catId){
      const cat=CATS.find(c=>c.id===q.catId);
      if(cat){const hint=document.createElement('div');hint.className='qz-review';hint.textContent='復習: '+tc(cat.titles)+' カテゴリを確認しよう';exp.after(hint);}
    }
    const ss=S.quizSetStart||0;const sz=Math.min(5,QUIZZES.length-ss);
    const btn=document.createElement('button');btn.className='btn-p';btn.style.marginTop='14px';
    btn.textContent=S.quizAns.length===sz?t('quiz.result'):t('quiz.next');
    btn.setAttribute('data-a','nextQ');
    document.querySelector('.qz-review')?document.querySelector('.qz-review').after(btn):exp.after(btn);
  }
  if(a==='nextQ'){S.quizIdx=Math.min(S.quizIdx+1,QUIZZES.length-1);save();render();}
  if(a==='nextQuizSet'){
    const ss=S.quizSetStart||0;const sz=Math.min(5,QUIZZES.length-ss);
    const cor=S.quizAns.filter(x=>x.ok).length;
    S.quizHistory.push({date:new Date().toDateString(),correct:cor,total:sz});
    S.quizSetStart=ss+sz;S.quizIdx=ss+sz;S.quizAns=[];quizOrders={};save();render();
  }
  if(a==='retryQuiz'){
    const ss=S.quizSetStart||0;const sz=Math.min(5,QUIZZES.length-ss);
    const cor=S.quizAns.filter(x=>x.ok).length;
    S.quizHistory.push({date:new Date().toDateString(),correct:cor,total:sz});
    S.quizIdx=ss;S.quizAns=[];quizOrders={};save();render();
  }
  if(a==='setFilter'){S.catFilter=v;save();render();}
  if(a==='toggleNotif'){
    if(!S.notifEnabled){enableNotif();}
    else{S.notifEnabled=false;save();render();}
  }
  if(a==='toggleDual'){S.dualLang=!S.dualLang;save();render();}
  if(a==='goStats'){S.screen='stats';S.tab='stats';save();render();}
  if(a==='openAvatarPicker'){S.showAvatarPicker=true;save();render();}
  if(a==='closeAvatarPicker'){S.showAvatarPicker=false;save();render();}
  if(a==='setAvatar'){S.avatar=parseInt(v);S.showAvatarPicker=false;save();render();}
  if(a==='editNickname'){S.editNickname=true;save();render();setTimeout(()=>{const inp=document.getElementById('nn-input');if(inp){inp.focus();inp.select();}},50);}
  if(a==='resetProgress'){
    if(confirm('進捗をリセットしますか？')){
      S.progress={};S.points=0;S.badges=[];S.quizHistory=[];S.streak=0;S.lastVisit=null;S.quizIdx=0;S.quizAns=[];S.quizSetStart=0;quizOrders={};
      save();render();showToast('リセットしました');
    }
  }
});

document.getElementById('nav').addEventListener('click',e=>{
  const btn=e.target.closest('[data-nav]');if(!btn)return;
  const n=btn.dataset.nav;S.tab=n;
  if(n==='home')S.screen='home';
  if(n==='quiz'){S.screen='quiz';S.quizIdx=0;S.quizAns=[];S.quizSetStart=0;quizOrders={}; }
  if(n==='stats')S.screen='stats';
  if(n==='settings')S.screen='settings';
  save();render();
});

setTimeout(() => {

}, 1200);

(function(){
  var wrap=document.getElementById('sim-wrap');
  function scale(){
    if(!window.matchMedia('(hover:hover)and(pointer:fine)').matches){
      wrap.style.transform='';return;
    }
    var s=Math.min(window.innerWidth*0.90/390,window.innerHeight*0.94/844);
    wrap.style.transform='scale('+s+')';
  }
  window.addEventListener('resize',scale);
  scale();
})();
</script>
