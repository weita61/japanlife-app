<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JapanLife — トモスマ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Sans:wght@400;700&family=Zen+Maru+Gothic:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent:#fbae17; --accent-light:#fff3d6; --navy:#1e2d4e;
      --text:#1C1C1C; --muted:#6B6B6B; --border:#E8E8E4;
      --surface:#FFFFFF; --bg:#FAFAF7;
      --success:#27ae60; --success-light:#e6f9ee;
      --danger:#e74c3c; --danger-light:#fde8e8;
      --radius-sm:8px; --radius-md:16px; --radius-lg:32px;
      --font-h:'Zen Maru Gothic',sans-serif;
      --font-b:'Noto Sans JP','Noto Sans',sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:#d8d5cf;font-family:var(--font-b);color:var(--text);}
    #app{max-width:390px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}
    #screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}

    /* NAV */
    #nav{display:none;background:var(--surface);border-top:1px solid var(--border);padding:4px 0 10px;}
    #nav.on{display:flex;}
    .ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;cursor:pointer;color:var(--muted);font-size:9px;font-weight:700;border:none;background:none;font-family:var(--font-h);}
    .ni.active{color:var(--accent);}
    .ni svg{width:21px;height:21px;}

    /* LANG SCREEN */
    .ls{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 28px;background:var(--navy);}
    .ls-logo{font-family:var(--font-h);font-size:34px;font-weight:700;color:var(--accent);margin-bottom:6px;}
    .ls-tag{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:40px;text-align:center;line-height:1.7;white-space:pre-line;}
    .lb{width:100%;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);border-radius:var(--radius-md);padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;margin-bottom:8px;color:white;transition:all .2s;}
    .lb:active,.lb.sel{background:rgba(251,174,23,0.2);border-color:var(--accent);}
    .lb-flag{font-size:24px;}
    .lb-name{font-family:var(--font-h);font-size:15px;font-weight:700;}
    .lb-native{font-size:11px;color:rgba(255,255,255,0.45);margin-top:1px;}
    .lb-tag{font-size:10px;font-weight:700;background:var(--accent);color:var(--text);padding:2px 8px;border-radius:100px;margin-left:auto;font-family:var(--font-h);}

    /* ONBOARD */
    .ob{min-height:100vh;padding:48px 20px 32px;}
    .ob-step{font-family:var(--font-h);font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.12em;margin-bottom:8px;}
    .ob-ttl{font-family:var(--font-h);font-size:22px;font-weight:700;line-height:1.3;margin-bottom:6px;}
    .ob-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
    .job-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px;}
    .jc{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-md);padding:16px 12px;cursor:pointer;text-align:center;transition:all .15s;}
    .jc.sel{border-color:var(--accent);background:var(--accent-light);}
    .jc-e{font-size:28px;margin-bottom:5px;}
    .jc-n{font-family:var(--font-h);font-size:12px;font-weight:700;}
    .btn-p{width:100%;background:var(--accent);color:var(--text);font-size:15px;font-weight:700;padding:14px;border:none;border-radius:var(--radius-lg);cursor:pointer;font-family:var(--font-h);}
    .btn-p:disabled{opacity:.35;pointer-events:none;}
    .btn-s{width:100%;background:var(--surface);color:var(--text);font-size:14px;font-weight:700;padding:13px;border:1.5px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;font-family:var(--font-h);margin-top:10px;}
    .btn-danger{width:100%;background:var(--danger-light);color:var(--danger);font-size:14px;font-weight:700;padding:13px;border:1.5px solid var(--danger);border-radius:var(--radius-lg);cursor:pointer;font-family:var(--font-h);}

    /* HOME */
    .hh{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10;}
    .hlogo{font-family:var(--font-h);font-size:20px;font-weight:700;}
    .hlogo span{color:var(--accent);}
    .hright{display:flex;align-items:center;gap:8px;}
    .streak-pill{display:flex;align-items:center;gap:4px;background:var(--accent-light);border-radius:100px;padding:4px 10px;font-size:13px;font-weight:700;font-family:var(--font-h);}
    .lang-pill{display:flex;align-items:center;gap:5px;background:var(--bg);border:1.5px solid var(--border);border-radius:100px;padding:5px 10px 5px 8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-h);transition:border-color .2s;}
    .lang-pill:active{border-color:var(--accent);}
    .lang-pill-flag{font-size:16px;line-height:1;}
    .lang-pill svg{width:12px;height:12px;color:var(--muted);}
    .hcont{padding:16px 20px 24px;}
    .sb{display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;margin-bottom:20px;cursor:pointer;}
    .sb svg{color:var(--muted);flex-shrink:0;width:16px;height:16px;}
    .sb-ph{font-size:14px;color:var(--muted);}
    .sec-ttl{font-family:var(--font-h);font-size:15px;font-weight:700;margin-bottom:10px;}
    .daily{background:var(--navy);border-radius:var(--radius-md);padding:20px;margin-bottom:24px;cursor:pointer;position:relative;overflow:hidden;}
    .daily::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(255,255,255,.04);border-radius:50%;pointer-events:none;}
    .daily-lbl{font-family:var(--font-h);font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.1em;margin-bottom:4px;}
    .daily-ttl{font-family:var(--font-h);font-size:17px;font-weight:700;color:white;margin-bottom:3px;}
    .daily-sub{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:14px;}
    .daily-btn{display:inline-block;background:var(--accent);color:var(--text);font-family:var(--font-h);font-size:12px;font-weight:700;padding:6px 14px;border-radius:var(--radius-lg);}
    /* filter chips */
    .filter-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:16px;}
    .filter-row::-webkit-scrollbar{display:none;}
    .fchip{padding:6px 16px;border-radius:100px;flex-shrink:0;font-family:var(--font-h);font-size:12px;font-weight:700;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;}
    .fchip.active{background:var(--navy);color:white;border-color:var(--navy);}
    .search-icon-btn{width:32px;height:32px;background:var(--surface);border:1.5px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
    .search-icon-btn svg{width:15px;height:15px;}
    /* category list */
    .cat-list{display:flex;flex-direction:column;gap:8px;}
    .cc{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-md);padding:14px 16px;cursor:pointer;transition:transform .1s;display:flex;align-items:center;gap:14px;}
    .cc:active{transform:scale(.98);}
    .cc-icon{font-size:24px;flex-shrink:0;}
    .cc-body{flex:1;min-width:0;}
    .cc-name{font-family:var(--font-h);font-size:14px;font-weight:700;margin-bottom:6px;}
    .cc-row{display:flex;align-items:center;gap:8px;}
    .cc-cnt{font-size:11px;color:var(--muted);flex-shrink:0;}
    .cc-arr{display:flex;align-items:center;flex-shrink:0;}
    .cc-arr svg{width:14px;height:14px;color:var(--muted);}
    .prog-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
    .prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}
    /* quiz review hint */
    .qz-review{font-size:12px;color:var(--muted);text-align:center;margin-top:10px;padding:8px 12px;background:var(--accent-light);border-radius:8px;}

    /* SCREEN HEADER */
    .sh{padding:13px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10;}
    .back{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:50%;cursor:pointer;border:none;flex-shrink:0;}
    .back svg{width:17px;height:17px;}
    .sh-ttl{font-family:var(--font-h);font-size:16px;font-weight:700;flex:1;}
    .share-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--accent-light);border-radius:50%;cursor:pointer;border:none;flex-shrink:0;}
    .share-btn svg{width:16px;height:16px;color:var(--accent);}

    /* ITEM LIST */
    .il{padding:8px 20px;}
    .ic{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;}
    .ic:last-child{border-bottom:none;}
    .ic-dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .ic-dot.done{background:var(--accent);border-color:var(--accent);}
    .ic-dot svg{width:13px;height:13px;}
    .ic-ttl{font-family:var(--font-h);font-size:14px;font-weight:700;}
    .ic-arr svg{width:15px;height:15px;color:var(--muted);}

    /* ITEM DETAIL */
    .id{padding:20px;}
    .cb{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:15px;margin-bottom:10px;}
    .cb-lbl{font-family:var(--font-h);font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--accent);margin-bottom:7px;}
    .cb-txt{font-size:14px;line-height:1.9;white-space:pre-line;}
    .tip{background:var(--accent-light);border-left:4px solid var(--accent);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:12px 14px;margin-bottom:20px;}
    .tip-lbl{font-family:var(--font-h);font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.1em;margin-bottom:4px;}
    .tip-txt{font-size:13px;line-height:1.7;}
    .done-btn{width:100%;background:var(--text);color:white;font-size:15px;font-weight:700;padding:14px;border:none;border-radius:var(--radius-lg);cursor:pointer;font-family:var(--font-h);}

    /* COMPLETION */
    .comp{background:var(--success-light);border:2px solid var(--success);border-radius:var(--radius-md);padding:22px 20px;margin-bottom:14px;display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;}
    .comp-circle{width:52px;height:52px;background:var(--success);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:6px;}
    .comp-circle svg{width:26px;height:26px;stroke:white;}
    .comp-pts{font-family:var(--font-h);font-size:19px;font-weight:700;color:var(--success);}
    .comp-stat{font-size:12px;color:var(--muted);}
    .comp-badge{margin-top:4px;background:var(--accent);color:var(--text);font-family:var(--font-h);font-size:12px;font-weight:700;padding:4px 12px;border-radius:100px;}
    .comp-hint{font-family:var(--font-h);font-size:11px;color:var(--accent);font-weight:700;margin-top:2px;}
    .back-link{display:block;text-align:center;margin-top:12px;font-size:13px;color:var(--muted);cursor:pointer;text-decoration:underline;}

    /* STATS / GROWTH */
    .stats-wrap{padding:20px;}
    .lv-card{background:var(--navy);border-radius:var(--radius-md);padding:22px;margin-bottom:16px;}
    .lv-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .lv-badge{background:var(--accent);color:var(--text);font-family:var(--font-h);font-size:11px;font-weight:700;padding:4px 12px;border-radius:100px;}
    .lv-name{font-family:var(--font-h);font-size:22px;font-weight:700;color:white;}
    .lv-pts{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px;}
    .xp-track{height:8px;background:rgba(255,255,255,.15);border-radius:4px;overflow:hidden;margin-bottom:6px;}
    .xp-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .5s;}
    .xp-label{font-size:11px;color:rgba(255,255,255,.45);text-align:right;}
    .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;}
    .stat-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;}
    .stat-cell-lbl{font-family:var(--font-h);font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;margin-bottom:4px;}
    .stat-cell-val{font-family:var(--font-h);font-size:24px;font-weight:700;color:var(--text);}
    .stat-cell-unit{font-size:11px;color:var(--muted);font-weight:400;}
    .badge-ttl{font-family:var(--font-h);font-size:15px;font-weight:700;margin-bottom:12px;}
    .badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .bi{text-align:center;padding:14px 8px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-md);}
    .bi.earned{border-color:var(--accent);background:var(--accent-light);}
    .bi-e{font-size:26px;margin-bottom:5px;}
    .bi-n{font-family:var(--font-h);font-size:10px;font-weight:700;line-height:1.3;}
    .bi:not(.earned) .bi-e{filter:grayscale(1);opacity:.35;}
    .bi:not(.earned) .bi-n{color:var(--muted);}

    /* QUIZ */
    .qz{padding:20px;}
    .qz-prog{height:5px;background:var(--border);border-radius:3px;margin-bottom:24px;overflow:hidden;}
    .qz-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;}
    .qz-num{font-family:var(--font-h);font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.1em;margin-bottom:8px;}
    .qz-q{font-family:var(--font-h);font-size:17px;font-weight:700;line-height:1.45;margin-bottom:22px;}
    .qz-choices{display:flex;flex-direction:column;gap:10px;}
    .qz-c{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-md);padding:13px 16px;cursor:pointer;font-size:14px;font-weight:700;color:var(--text);text-align:left;font-family:var(--font-b);transition:all .15s;}
    .qz-c.correct{background:var(--success-light);border-color:var(--success);color:var(--success);}
    .qz-c.wrong{background:var(--danger-light);border-color:var(--danger);color:var(--danger);}
    .qz-exp{margin-top:14px;padding:13px;background:var(--bg);border-radius:var(--radius-sm);font-size:13px;line-height:1.7;border:1px solid var(--border);}
    .qz-res{text-align:center;padding:48px 20px 32px;}
    .qz-res-ttl{font-family:var(--font-h);font-size:22px;font-weight:700;margin-bottom:20px;}
    .qz-res-score{font-family:var(--font-h);font-size:52px;font-weight:700;color:var(--accent);line-height:1;}
    .qz-res-sub{font-size:13px;color:var(--muted);margin-bottom:32px;}

    /* SETTINGS */
    .set-wrap{padding:16px 20px 32px;}
    .set-sec{margin-bottom:24px;}
    .set-sec-ttl{font-family:var(--font-h);font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.12em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
    .set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
    .set-row:last-child{border-bottom:none;}
    .set-row-lbl{font-family:var(--font-h);font-size:14px;font-weight:700;}
    .set-row-sub{font-size:11px;color:var(--muted);margin-top:2px;}
    .toggle{width:44px;height:26px;background:var(--border);border-radius:13px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
    .toggle.on{background:var(--accent);}
    .toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;background:white;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
    .toggle.on::after{transform:translateX(18px);}
    .time-input{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;font-size:14px;font-family:var(--font-b);color:var(--text);cursor:pointer;}
    .time-input:focus{outline:none;border-color:var(--accent);}
    .set-lang-grid{display:flex;flex-direction:column;gap:8px;}
    .slb{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-md);cursor:pointer;transition:all .15s;}
    .slb.sel{border-color:var(--accent);background:var(--accent-light);}
    .slb-flag{font-size:22px;}
    .slb-name{font-family:var(--font-h);font-size:14px;font-weight:700;}
    .slb-check{width:18px;height:18px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;margin-left:auto;flex-shrink:0;}
    .slb-check svg{width:10px;height:10px;stroke:white;}

    /* SEARCH */
    .sw{padding:16px 20px;}
    .si-wrap{display:flex;align-items:center;gap:10px;background:var(--surface);border:2px solid var(--accent);border-radius:var(--radius-md);padding:11px 14px;margin-bottom:14px;}
    .si-wrap svg{color:var(--muted);flex-shrink:0;width:16px;height:16px;}
    .si{flex:1;border:none;background:none;font-size:15px;font-family:var(--font-b);outline:none;color:var(--text);}
    .sr{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;}
    .sr-tag{display:inline-block;font-family:var(--font-h);font-size:10px;font-weight:700;background:var(--accent-light);color:var(--accent);padding:2px 8px;border-radius:100px;margin-top:3px;}
    .no-res{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;}

    /* TOAST */
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:white;font-family:var(--font-h);font-size:13px;font-weight:700;padding:10px 20px;border-radius:var(--radius-lg);z-index:999;pointer-events:none;opacity:1;transition:opacity .4s;}
    .toast.hide{opacity:0;}
  </style>
</head>
<body>
<div id="app">
  <div id="screen"></div>
  <nav id="nav">
    <button class="ni" data-nav="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span id="nl-home">ホーム</span>
    </button>
    <button class="ni" data-nav="quiz">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span id="nl-quiz">クイズ</span>
    </button>
    <button class="ni" data-nav="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span id="nl-stats">成長</span>

function getQuizOrder(qi){
  if(!quizOrders[qi]){
    const n=QUIZZES[qi]?tc_arr(QUIZZES[qi].choices).length:4;
    quizOrders[qi]=Array.from({length:n},(_,i)=>i).sort(()=>Math.random()-.5);
  }
  return quizOrders[qi];
}
function load(){
  const def={screen:'language',lang:'ja',jobType:null,tab:'home',catId:null,itemId:null,
    progress:{},streak:0,lastVisit:null,points:0,badges:[],
    quizIdx:0,quizAns:[],quizHistory:[],quizSetStart:0,catFilter:'all',
    searchQ:'',notifEnabled:false,notifTime:'09:00',lastNotif:null,
    firstUse:new Date().toDateString(),dualLang:true};
  try{const d=localStorage.getItem('jl2');if(d)return Object.assign(def,JSON.parse(d));}catch(e){}
  return def;
}

// ── HELPERS ───────────────────────────────────────────
function getDone(cid){const c=CATS.find(x=>x.id===cid);return c?c.items.filter(i=>S.progress[i.id]).length:0;}
function getPct(cid){const c=CATS.find(x=>x.id===cid);return(c&&c.items.length)?getDone(cid)/c.items.length:0;}
function getLevel(){for(let i=LEVELS.length-1;i>=0;i--)if(S.points>=LEVELS[i].min)return LEVELS[i];return LEVELS[0];}
function getNextItem(cid,iid){const c=CATS.find(x=>x.id===cid);if(!c)return null;const i=c.items.findIndex(x=>x.id===iid);return(i>=0&&i<c.items.length-1)?c.items[i+1]:null;}
function getDailyItem(){
  const all=CATS.flatMap(c=>c.items.map(i=>({...i,catId:c.id})));
  const unread=all.filter(i=>!S.progress[i.id]);
  if(unread.length)return unread[0];
  return all[Math.floor(Date.now()/86400000)%all.length];
}
function totalItems(){return CATS.reduce((a,c)=>a+c.items.length,0);}
function doneItems(){return CATS.reduce((a,c)=>a+getDone(c.id),0);}
function quizAcc(){const h=S.quizHistory;if(!h.length)return null;const tot=h.reduce((a,x)=>a+x.total,0);const cor=h.reduce((a,x)=>a+x.correct,0);return tot?Math.round(cor/tot*100):null;}
function checkBadges(){
  BADGES.forEach(b=>{
    if(S.badges.includes(b.id))return;
    if(b.catId&&getPct(b.catId)>=1){S.badges.push(b.id);S.points+=50;}
    if(b.id==='b_str7'&&S.streak>=7){S.badges.push(b.id);S.points+=100;}
  });
}
function updateStreak(){
  const today=new Date().toDateString();
  if(S.lastVisit===today)return;
  const y=new Date();y.setDate(y.getDate()-1);
  S.streak=(S.lastVisit===y.toDateString())?S.streak+1:1;
  S.lastVisit=today;
}
function srch(q){
  if(!q.trim())return[];
  const lo=q.toLowerCase();
  return CATS.flatMap(c=>c.items.filter(i=>tc(i.titles).toLowerCase().includes(lo)||tc(i.body).toLowerCase().includes(lo)).map(i=>({...i,catId:c.id,catName:tc(c.titles)})));
}
function showToast(msg){
  const el=document.createElement('div');el.className='toast';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>{el.classList.add('hide');setTimeout(()=>el.remove(),400);},2000);
}
async function shareItem(item,cat){
  const ja=item.titles.ja;
  const nativeTip=tc(item.tip);
  const jaTip=item.tip.ja;
  let text=`📚 JapanLife｜${ja}\n\n`;
  if(S.lang!=='ja')text+=`${nativeTip}\n`;
  text+=`💡 ${jaTip}\n\n#JapanLife #技能実習生 #TOMOSUMA`;
  try{
    if(navigator.share)await navigator.share({title:`JapanLife｜${ja}`,text});
    else{await navigator.clipboard.writeText(text);showToast(t('share.copied'));}
  }catch(e){try{await navigator.clipboard.writeText(text);showToast(t('share.copied'));}catch(e2){}}
}
function checkNotif(){
  if(!S.notifEnabled||!S.notifTime)return;
  if(!('Notification'in window)||Notification.permission!=='granted')return;
  const now=new Date();
  const [h,m]=S.notifTime.split(':').map(Number);
  const today=now.toDateString();
  if(S.lastNotif===today)return;
  if(now.getHours()===h&&now.getMinutes()===m){
    S.lastNotif=today;save();
    const d=getDailyItem();
    new Notification('JapanLife',{body:tc(d.titles)+' — '+t('notif.body')});
  }
}
async function enableNotif(){
  if(!('Notification'in window)){showToast('この端末は非対応です');return;}
  const p=await Notification.requestPermission();
  if(p==='granted'){S.notifEnabled=true;save();render();}
  else{showToast('通知が許可されていません');}
}

function render(){
  const nav=document.getElementById('nav');
  const showNav=['home','search','category','item','quiz','stats','settings'].includes(S.screen);
  nav.classList.toggle('on',showNav&&S.screen!=='language'&&S.screen!=='jobtype');
  document.querySelectorAll('.ni').forEach(el=>el.classList.toggle('active',el.dataset.nav===S.tab));
  ['home','quiz','stats','settings'].forEach(k=>{const el=document.getElementById('nl-'+k);if(el)el.textContent=t('nav.'+k);});
  document.getElementById('screen').innerHTML=renderScreen();
  bindInputs();
}
function renderScreen(){
  switch(S.screen){
    case 'language': return rLang();
    case 'jobtype':  return rJob();
    case 'home':     return rHome();
    case 'search':   return rSearch();
    case 'category': return rCat();
    case 'item':     return rItem();
    case 'quiz': {const ss=S.quizSetStart||0;const sz=Math.min(5,QUIZZES.length-ss);return S.quizAns.length===sz?rQuizRes():rQuiz();}

  }
}

function rItem(){
  const cat=CATS.find(x=>x.id===S.catId);
  const item=cat&&cat.items.find(x=>x.id===S.itemId);
  if(!item)return'';
  const done=S.progress[item.id];
  const isJa=S.lang==='ja'||S.lang==='ja_easy';
  const showDual=S.dualLang&&!isJa;
  const showEasyDual=S.dualLang&&S.lang==='ja_easy';
  const nextItem=getNextItem(S.catId,item.id);
  const catDone=getDone(S.catId);
  const catTotal=cat.items.length;
  const catComplete=catDone>=catTotal;
  const badgeForCat=BADGES.find(b=>b.catId===S.catId);
  const rem=catTotal-catDone;

  // content blocks
  let blocks='';
  if(showDual){
    blocks=`
      <div class="cb"><div class="cb-lbl">${t('item.native')}</div><div class="cb-txt">${tc(item.body)}</div></div>
      <div class="cb"><div class="cb-lbl">${t('item.ja')}</div><div class="cb-txt">${item.body.ja}</div></div>`;
  }else if(showEasyDual){
    blocks=`
      <div class="cb"><div class="cb-lbl">${t('item.native')}</div><div class="cb-txt">${tc(item.body)}</div></div>
      <div class="cb"><div class="cb-lbl">${t('item.ja')}</div><div class="cb-txt">${item.body.ja}</div></div>`;
  }else{
    blocks=`<div class="cb"><div class="cb-lbl">${isJa?t('item.ja'):t('item.native')}</div><div class="cb-txt">${tc(item.body)}</div></div>`;
  }

  // tip
  const tipBlock=`<div class="tip"><div class="tip-lbl">💡 ${t('item.tip')}</div><div class="tip-txt">${tc(item.tip)}</div></div>`;

  // action
  let action='';
  if(!done){
    action=`<button class="done-btn" data-a="markDone" data-v="${item.id}">${t('item.done')}</button>`;
  }else{
    const badgeRow=catComplete&&badgeForCat
      ?`<div class="comp-badge">${t('comp.badge')} ${cat.emoji}</div>`
      :rem===1?`<div class="comp-hint">${t('comp.hint1')}</div>`:'';
    action=`
      <div class="comp">
        <div class="comp-circle">${I.check}</div>
        <div class="comp-pts">${t('comp.pt')}</div>
        <div class="comp-stat">${catDone} / ${catTotal} 完了</div>
        ${badgeRow}
      </div>
      ${nextItem
        ?`<button class="btn-p" data-a="goNextItem" data-cat="${S.catId}" data-item="${nextItem.id}">${t('item.next')}</button>`
        :`<button class="btn-p" data-a="back">${catComplete?t('item.allcat'):t('item.back')}</button>`}
      ${nextItem?`<span class="back-link" data-a="back">${t('item.back')}</span>`:''}`;
  }

  return`
    <div class="sh">
      <button class="back" data-a="back">${I.back}</button>
      <span class="sh-ttl">${tc(item.titles)}</span>
      <button class="share-btn" data-a="shareItem" data-cat="${S.catId}" data-item="${item.id}">${I.share}</button>
    </div>
    <div class="id">${blocks}${tipBlock}${action}</div>`;
}

function rQuiz(){
  const ss=S.quizSetStart||0;
  const sz=Math.min(5,QUIZZES.length-ss);
  const pos=S.quizIdx-ss;
  const q=QUIZZES[S.quizIdx];
  const pct=pos/sz*100;
  const setNum=Math.floor(ss/5)+1;
  const totalSets=Math.ceil(QUIZZES.length/5);
  return`
    <div class="sh"><button class="back" data-a="goHome">${I.back}</button><span class="sh-ttl">Quiz ${pos+1}/${sz}${totalSets>1?' · Set '+setNum+'/'+totalSets:''}</span></div>

      <div class="qz-num">Q${pos+1} / ${sz}</div>
      <div class="qz-q">${tc(q.question)}</div>
      <div class="qz-choices">
        ${(()=>{const order=getQuizOrder(S.quizIdx);const choices=tc_arr(q.choices);return order.map(origIdx=>`<button class="qz-c" data-a="answer" data-qi="${S.quizIdx}" data-ci="${origIdx}">${choices[origIdx]}</button>`).join('');})()}
      </div>
    </div>`;
}

function rQuizRes(){
  const ss=S.quizSetStart||0;
  const sz=Math.min(5,QUIZZES.length-ss);
  const cor=S.quizAns.filter(a=>a.ok).length;
  const p=cor/sz;
  const hasMore=ss+sz<QUIZZES.length;
  return`<div class="qz-res">
    <div style="font-size:56px;margin-bottom:14px">${p>=.8?'🎉':p>=.6?'👍':'📚'}</div>
    <div class="qz-res-ttl">${p>=.8?t('quiz.great'):p>=.6?t('quiz.good'):t('quiz.keep')}</div>
    <div class="qz-res-score">${cor}/${sz}</div>
    <div class="qz-res-sub">${t('quiz.score')}</div>
    ${hasMore?`<button class="btn-p" data-a="nextQuizSet">次の5問へ →</button>`:''}
    <button class="${hasMore?'btn-s':'btn-p'}" data-a="retryQuiz">${t('quiz.retry')}</button>
    <button class="btn-s" data-a="goHome">${t('quiz.home')}</button>
  </div>`;
}

function rStats(){
  const lv=getLevel();
  const xpMin=lv.min;
  const xpNext=lv.next;
  const xpPct=xpNext?Math.min((S.points-xpMin)/(xpNext-xpMin)*100,100):100;
  const acc=quizAcc();
  return`<div class="stats-wrap">
    <div class="lv-card">
      <div class="lv-row">
        <div class="lv-badge">LV.${lv.lv}</div>
        <div style="text-align:right">
          <div class="lv-name">${tc(lv.name)}</div>
          <div class="lv-pts">${S.points} pt</div>
        </div>
      </div>
      <div class="xp-track"><div class="xp-fill" style="width:${xpPct}%"></div></div>
      <div class="xp-label">${xpNext?`${t('stats.nxtlv')} ${xpNext-S.points}pt`:'MAX LEVEL'}</div>
    </div>
    <div class="stat-grid">
      <div class="stat-cell">
        <div class="stat-cell-lbl">${t('stats.read')}</div>
        <div class="stat-cell-val">${doneItems()}<span class="stat-cell-unit"> / ${totalItems()}</span></div>
      </div>
      <div class="stat-cell">
        <div class="stat-cell-lbl">${t('stats.acc')}</div>
        <div class="stat-cell-val">${acc!==null?acc+'%':'—'}</div>
      </div>
      <div class="stat-cell">
        <div class="stat-cell-lbl">${t('stats.streak')}</div>
        <div class="stat-cell-val">${S.streak}<span class="stat-cell-unit"> 日</span></div>
      </div>
      <div class="stat-cell">
        <div class="stat-cell-lbl">${t('stats.badges')}</div>
        <div class="stat-cell-val">${S.badges.length}<span class="stat-cell-unit"> / ${BADGES.length}</span></div>
      </div>
    </div>
    <div class="badge-ttl">${t('stats.badges')}</div>
    <div class="badge-grid">
      ${BADGES.map(b=>`<div class="bi${S.badges.includes(b.id)?' earned':''}">
        <div class="bi-e">${b.emoji}</div><div class="bi-n">${tc(b.name)}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function rSettings(){
  const langs=[
    {code:'ja',flag:'🇯🇵',name:'日本語'},
    {code:'ja_easy',flag:'🇯🇵',name:'やさしい日本語'},
    {code:'vi',flag:'🇻🇳',name:'Tiếng Việt'},
    {code:'km',flag:'🇰🇭',name:'ភាសាខ្មែរ'},
    {code:'en',flag:'🇺🇸',name:'English'},
  ];
  const jobs=[
    {id:'factory',emoji:'🏭',name:{ja:'製造・工場',vi:'Sản xuất',en:'Factory'}},
    {id:'agri',emoji:'🌾',name:{ja:'農業・漁業',vi:'Nông/Ngư nghiệp',en:'Agriculture'}},
    {id:'construction',emoji:'🔨',name:{ja:'建設',vi:'Xây dựng',en:'Construction'}},
    {id:'care',emoji:'❤️',name:{ja:'介護',vi:'Điều dưỡng',en:'Caregiving'}},
    {id:'food',emoji:'🍱',name:{ja:'飲食',vi:'Ẩm thực',en:'Food Service'}},
    {id:'other',emoji:'💼',name:{ja:'その他',vi:'Khác',en:'Other'}},
  ];
  return`<div class="set-wrap">
    <div class="sec-ttl" style="margin-bottom:16px">設定</div>

    <div class="set-sec">
      <div class="set-sec-ttl">${t('set.lang')}</div>
      <div class="set-lang-grid">
        ${langs.map(l=>`<div class="slb${S.lang===l.code?' sel':''}" data-a="setLang" data-v="${l.code}" data-stay="1">
          <span class="slb-flag">${l.flag}</span>
          <span class="slb-name">${l.name}</span>
          ${S.lang===l.code?`<span class="slb-check">${I.check}</span>`:''}
        </div>`).join('')}
      </div>
    </div>

    <div class="set-sec">
      <div class="set-sec-ttl">${t('set.dual')}</div>
      <div class="set-row">
        <div><div class="set-row-lbl">${t('set.dual')}</div><div class="set-row-sub">日本語と母国語を同時表示</div></div>
        <div class="toggle${S.dualLang?' on':''}" data-a="toggleDual"></div>
      </div>
    </div>

    <div class="set-sec">
      <div class="set-sec-ttl">${t('set.notif')}</div>
      <div class="set-row">
        <div><div class="set-row-lbl">${t('set.notif_on')}</div></div>
        <div class="toggle${S.notifEnabled?' on':''}" data-a="toggleNotif"></div>
      </div>
      ${S.notifEnabled?`<div class="set-row">
        <div class="set-row-lbl">${t('set.notif_time')}</div>
        <input class="time-input" id="notif-time" type="time" value="${S.notifTime}">
      </div>`:''}
    </div>

    <div class="set-sec">
      <div class="set-sec-ttl">${t('set.job')}</div>
      <div class="job-grid">
        ${jobs.map(j=>`<div class="jc${S.jobType===j.id?' sel':''}" data-a="selJob" data-v="${j.id}" data-stay="1">
          <div class="jc-e">${j.emoji}</div><div class="jc-n">${tc(j.name)}</div>
        </div>`).join('')}
      </div>
    </div>

    <div class="set-sec">
      <div class="set-sec-ttl">データ</div>
      <button class="btn-danger" data-a="resetProgress">${t('set.reset')}</button>
    </div>
  </div>`;
}

// ── EVENTS ────────────────────────────────────────────
function bindInputs(){
  const inp=document.getElementById('si');
  if(inp){inp.addEventListener('input',e=>{S.searchQ=e.target.value;document.getElementById('screen').innerHTML=renderScreen();bindInputs();});inp.focus();}
  const nt=document.getElementById('notif-time');
  if(nt){nt.addEventListener('change',e=>{S.notifTime=e.target.value;save();});}
}

document.addEventListener('click',e=>{
  const el=e.target.closest('[data-a]');if(!el)return;
  const a=el.dataset.a,v=el.dataset.v;

  if(a==='setLang'){
    S.lang=v;
    if(!el.dataset.stay){S.screen='jobtype';}
    save();render();
  }
  if(a==='selJob'){
    S.jobType=v;
    if(!el.dataset.stay){
      document.querySelectorAll('.jc').forEach(c=>c.classList.toggle('sel',c.dataset.v===v));
      const btn=document.querySelector('[data-a="startApp"]');if(btn)btn.disabled=false;
    }else{save();render();}
  }
  if(a==='startApp'&&S.jobType){updateStreak();S.screen='home';S.tab='home';save();render();}
  if(a==='goSearch'){S.screen='search';save();render();}
  if(a==='goCat'){S.catId=v;S.screen='category';save();render();}
  if(a==='goItem'){S.catId=el.dataset.cat;S.itemId=el.dataset.item;S.screen='item';save();render();}
  if(a==='goNextItem'){S.catId=el.dataset.cat;S.itemId=el.dataset.item;save();render();}
  if(a==='goHome'){S.screen='home';S.tab='home';S.quizIdx=0;S.quizAns=[];S.quizSetStart=0;save();render();}
  if(a==='goSettings'){S.screen='settings';S.tab='settings';save();render();}
  if(a==='back'){
    if(S.screen==='item')S.screen='category';
    else if(S.screen==='category'){S.screen='home';S.tab='home';}
    else{S.screen='home';S.tab='home';}
    save();render();
  }
  if(a==='markDone'){
    if(!S.progress[v]){S.progress[v]=true;S.points+=10;checkBadges();save();render();}
  }
  if(a==='shareItem'){
    const cat=CATS.find(x=>x.id===el.dataset.cat);
    const item=cat&&cat.items.find(x=>x.id===el.dataset.item);
    if(item)shareItem(item,cat);
  }
  if(a==='answer'){
    const qi=parseInt(el.dataset.qi),ci=parseInt(el.dataset.ci);
    const q=QUIZZES[qi];const ok=ci===q.answer;
    document.querySelectorAll('.qz-c').forEach(c=>{const origIdx=parseInt(c.dataset.ci);c.disabled=true;if(origIdx===q.answer)c.classList.add('correct');else if(origIdx===ci&&!ok)c.classList.add('wrong');});
    S.quizAns.push({qi,ci,ok});if(ok)S.points+=20;save();
    const exp=document.createElement('div');exp.className='qz-exp';exp.textContent=tc(q.explanation);
    document.querySelector('.qz-choices').after(exp);
    if(!ok&&q.catId){const cat=CATS.find(c=>c.id===q.catId);if(cat){const hint=document.createElement('div');hint.className='qz-review';hint.textContent='📚 復習: '+tc(cat.titles)+' カテゴリを確認しよう';exp.after(hint);}}
    const ss=S.quizSetStart||0;const sz=Math.min(5,QUIZZES.length-ss);
    const btn=document.createElement('button');btn.className='btn-p';btn.style.marginTop='14px';
    btn.textContent=S.quizAns.length===sz?t('quiz.result'):t('quiz.next');
    btn.setAttribute('data-a','nextQ');
    const hintEl=document.querySelector('.qz-review');hintEl?hintEl.after(btn):exp.after(btn);
  }
  if(a==='nextQ'){S.quizIdx=Math.min(S.quizIdx+1,QUIZZES.length-1);save();render();}
  if(a==='nextQuizSet'){
    const ss=S.quizSetStart||0;const sz=Math.min(5,QUIZZES.length-ss);
    const cor=S.quizAns.filter(x=>x.ok).length;
    S.quizHistory.push({date:new Date().toDateString(),correct:cor,total:sz});
    S.quizSetStart=ss+sz;S.quizIdx=ss+sz;S.quizAns=[];quizOrders={};save();render();
  }
  if(a==='retryQuiz'){
    const ss=S.quizSetStart||0;const sz=Math.min(5,QUIZZES.length-ss);
    const cor=S.quizAns.filter(x=>x.ok).length;
    S.quizHistory.push({date:new Date().toDateString(),correct:cor,total:sz});
    S.quizIdx=ss;S.quizAns=[];quizOrders={};save();render();
  }
  if(a==='setFilter'){S.catFilter=v;save();render();}
  if(a==='toggleNotif'){
    if(!S.notifEnabled){enableNotif();}
    else{S.notifEnabled=false;save();render();}
  }
  if(a==='toggleDual'){S.dualLang=!S.dualLang;save();render();}
  if(a==='resetProgress'){
    if(confirm('進捗をリセットしますか？')){
      S.progress={};S.points=0;S.badges=[];S.quizHistory=[];S.streak=0;S.lastVisit=null;S.quizIdx=0;S.quizAns=[];S.quizSetStart=0;
      save();render();showToast('リセットしました');
    }
  }
});

document.getElementById('nav').addEventListener('click',e=>{
  const btn=e.target.closest('[data-nav]');if(!btn)return;
  const n=btn.dataset.nav;S.tab=n;
  if(n==='home')S.screen='home';
  if(n==='quiz'){S.screen='quiz';S.quizIdx=0;S.quizAns=[];S.quizSetStart=0;}
  if(n==='stats')S.screen='stats';
  if(n==='settings')S.screen='settings';
  save();render();
});

// ── INIT ──────────────────────────────────────────────
updateStreak();render();
setInterval(checkNotif,30000);
checkNotif();
</script>
</body>
</html>
